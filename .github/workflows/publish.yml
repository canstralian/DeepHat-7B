name: Publish Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-hugging-face-space
  cancel-in-progress: true

env:
  HF_SPACE_ID: S-Dreamer/DeepHat-7B

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade pip huggingface_hub pytest

      - name: Compile Python files
        run: python -m compileall app.py src evals tests

      - name: Run tests
        run: python -m pytest

      - name: Publish to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_TOKEN"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id=os.environ["HF_SPACE_ID"],
              repo_type="space",
              folder_path=".",
              commit_message="chore: publish from github actions",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".pytest_cache/*",
                  ".venv/*",
                  "__pycache__/*",
                  "*.pyc",
                  "outputs/*",
                  "work/*",
              ],
          )
          PY
